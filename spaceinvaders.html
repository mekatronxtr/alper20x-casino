<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Space Invaders – alper20x game</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#06080e;color:#e2e8f0;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
    header{width:100%;background:rgba(6,8,14,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.07);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:monospace;font-weight:900;font-size:1.1rem;background:linear-gradient(135deg,#6c63ff,#ff6584);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
    .back{color:#7a8394;text-decoration:none;font-size:.85rem}.back:hover{color:#fff}
    .wrap{display:flex;flex-direction:column;align-items:center;padding:30px 20px;gap:12px;flex:1}
    h1{font-family:monospace;font-size:1.3rem;letter-spacing:3px;color:#4fc3f7}
    canvas{border:2px solid rgba(79,195,247,.3);border-radius:10px;background:#04060e;box-shadow:0 0 40px rgba(79,195,247,.1)}
    #msg{font-size:.9rem;color:#7a8394;text-align:center}
    .btn{background:linear-gradient(135deg,#4fc3f7,#0288d1);color:#fff;border:none;padding:10px 28px;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer}.btn:hover{opacity:.85}
  </style>
</head>
<body>
<header>
  <a class="back" href="index.html">← Geri</a>
  <div class="logo">alper20x game</div>
  <div></div>
</header>
<div class="wrap">
  <h1>👾 SPACE INVADERS</h1>
  <canvas id="c" width="420" height="480"></canvas>
  <div id="msg">← → Hareket | SPACE Ateş | Enter Başla</div>
  <button class="btn" id="startBtn">Başla</button>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const W=420,H=480;
let player,aliens,bullets,enemyBullets,score,best=0,lives,state='idle',alienDir,alienMoveTimer,alienShootTimer,wave;
const EMOJIS=['👾','👽','🤖'];
function makeAliens(){
  const a=[];
  for(let r=0;r<4;r++)for(let c=0;c<9;c++)a.push({x:40+c*42,y:60+r*40,alive:true,type:Math.min(r,2)});
  return a;
}
function init(){
  player={x:W/2-20,w:40,y:440};bullets=[];enemyBullets=[];score=0;lives=3;wave=1;
  aliens=makeAliens();alienDir=1;alienMoveTimer=0;alienShootTimer=0;state='play';
  document.getElementById('msg').textContent='';
}
let keys={};
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='Enter'){if(state!=='play')init();}
  if(e.key===' '){e.preventDefault();if(state==='play'&&bullets.length<3)bullets.push({x:player.x+player.w/2,y:player.y,vy:-8});}
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
function update(){
  if(keys['ArrowLeft'])player.x=Math.max(0,player.x-5);
  if(keys['ArrowRight'])player.x=Math.min(W-player.w,player.x+5);
  bullets=bullets.filter(b=>{b.y+=b.vy;return b.y>0;});
  enemyBullets=enemyBullets.filter(b=>{b.y+=b.vy;return b.y<H;});
  alienMoveTimer++;
  const alive=aliens.filter(a=>a.alive);
  const spd=Math.max(4,8-wave);
  if(alienMoveTimer>spd){
    alienMoveTimer=0;
    let hit=false;
    alive.forEach(a=>{a.x+=alienDir*12;if(a.x<10||a.x>W-30)hit=true;});
    if(hit){alienDir*=-1;alive.forEach(a=>{a.y+=18;});}
  }
  alienShootTimer++;
  if(alienShootTimer>40){alienShootTimer=0;if(alive.length){const a=alive[Math.floor(Math.random()*alive.length)];enemyBullets.push({x:a.x+12,y:a.y+20,vy:4});}}
  bullets.forEach(b=>{
    aliens.forEach(a=>{if(a.alive&&b.x>a.x&&b.x<a.x+26&&b.y>a.y&&b.y<a.y+26){a.alive=false;b.y=-99;score+=10*(a.type+1);if(score>best)best=score;}});
  });
  enemyBullets.forEach(b=>{if(b.x>player.x&&b.x<player.x+player.w&&b.y>player.y&&b.y<player.y+20){b.y=H+1;lives--;if(lives<=0)state='dead';}});
  if(alive.some(a=>a.y+26>player.y))state='dead';
  if(alive.length===0){wave++;aliens=makeAliens();alienDir=1;}
}
function draw(){
  ctx.fillStyle='#04060e';ctx.fillRect(0,0,W,H);
  for(let i=0;i<80;i++){ctx.fillStyle=`rgba(255,255,255,${Math.random()*.4+.1})`;ctx.fillRect(Math.random()*W,Math.random()*H,1,1);}
  aliens.forEach(a=>{if(!a.alive)return;ctx.font='22px serif';ctx.textAlign='left';ctx.fillText(EMOJIS[a.type],a.x,a.y+22);});
  const pg=ctx.createLinearGradient(player.x,0,player.x+player.w,0);pg.addColorStop(0,'#4fc3f7');pg.addColorStop(1,'#0288d1');
  ctx.fillStyle=pg;ctx.fillRect(player.x,player.y,player.w,18);ctx.fillRect(player.x+14,player.y-10,12,12);
  bullets.forEach(b=>{ctx.fillStyle='#43e97b';ctx.fillRect(b.x-2,b.y,4,12);});
  enemyBullets.forEach(b=>{ctx.fillStyle='#ff6584';ctx.fillRect(b.x-2,b.y,4,10);});
  ctx.fillStyle='#fff';ctx.font='14px monospace';ctx.textAlign='left';ctx.fillText('SKOR: '+score,8,22);
  ctx.textAlign='center';ctx.fillText('EN İYİ: '+best,W/2,22);ctx.fillText('DALGA: '+wave,W/2,40);
  ctx.textAlign='right';ctx.fillText('CAN: '+lives,W-8,22);
  if(state==='idle'){ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#4fc3f7';ctx.font='bold 26px monospace';ctx.textAlign='center';ctx.fillText('SPACE INVADERS',W/2,H/2-20);ctx.fillStyle='#fff';ctx.font='14px monospace';ctx.fillText('Enter veya Başla düğmesi',W/2,H/2+14);}
  if(state==='dead'){ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#ff6584';ctx.font='bold 26px monospace';ctx.textAlign='center';ctx.fillText('GAME OVER',W/2,H/2-30);ctx.fillStyle='#fff';ctx.font='16px monospace';ctx.fillText('Skor: '+score,W/2,H/2+4);ctx.font='13px monospace';ctx.fillStyle='#7a8394';ctx.fillText('Enter veya Başla',W/2,H/2+34);}
}
function loop(){if(state==='play')update();draw();requestAnimationFrame(loop);}
document.getElementById('startBtn').addEventListener('click',init);
loop();
</script>
</body>
</html>
